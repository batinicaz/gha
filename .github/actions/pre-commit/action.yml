name: pre-commit
description: Run pre-commit hooks with native tool installation and caching
author: batinicaz

inputs:
  path:
    description: The path to the configuration to run pre-commit against
    default: ${{ github.workspace }}
    required: false
  python-version:
    description: Python version for pre-commit
    default: "3.x"
    required: false
  terraform-version:
    description: Terraform version (used by terraform-fmt and terraform-validate hooks)
    default: "latest"
    required: false
  tflint-version:
    description: TFLint version (used by tflint hook)
    default: "latest"
    required: false
  terraform-docs-version:
    description: terraform-docs version (used by terraform-docs-system hook)
    default: "v0.22.0"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
      with:
        tflint_version: ${{ inputs.tflint-version }}

    - name: Setup terraform-docs
      uses: batinicaz/gha/.github/actions/setup-terraform-docs@v1
      with:
        version: ${{ inputs.terraform-docs-version }}

    - name: Cache pre-commit environments
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.cache/pre-commit
          ~/.cache/pip
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-

    - name: Install pre-commit
      run: pip install pre-commit
      shell: bash

    - name: Run pre-commit
      run: |
        cd "${{ inputs.path }}"
        pre-commit run --all-files
      shell: bash
