name: pre-commit
description: Run pre-commit hooks with native tool installation and caching
author: batinicaz

inputs:
  path:
    description: The path to the configuration to run pre-commit against
    default: ${{ github.workspace }}
    required: false
  python-version:
    description: Python version for pre-commit
    default: "3.x"
    required: false
  terraform-version:
    description: Terraform version (used by terraform-fmt and terraform-validate hooks)
    default: "latest"
    required: false
  tflint-version:
    description: TFLint version (used by tflint hook)
    default: "latest"
    required: false
  terraform-docs-version:
    description: terraform-docs version (used by terraform-docs-system hook)
    default: "v0.24.0"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6
      with:
        tflint_version: ${{ inputs.tflint-version }}

    - name: Setup terraform-docs
      uses: batinicaz/gha/.github/actions/setup-terraform-docs@v1
      with:
        version: ${{ inputs.terraform-docs-version }}

    - name: Cache pre-commit environments
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          ~/.cache/pre-commit
          ~/.cache/pip
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-

    - name: Install pre-commit
      run: pip install pre-commit
      shell: bash

    - name: Run pre-commit
      run: |
        cd "${{ inputs.path }}"
        pre-commit run --all-files
      shell: bash
