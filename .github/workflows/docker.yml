on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub Actions runner label"
        type: string
        default: "ubuntu-latest"
        required: false
      push:
        description: "Push image to registry after successful build and scan"
        type: boolean
        default: true
        required: false
      smoke_test:
        description: "Shell commands to run as a smoke test against the built image. The image ref is available as $IMAGE. Leave empty to skip."
        type: string
        default: ""
        required: false
      smoke_test_timeout:
        description: "Timeout in minutes for the smoke test step"
        type: number
        default: 5
        required: false
      no_cache_filter:
        description: "Comma-separated list of Dockerfile stage names to always rebuild (skip cache). Useful for stages with apk upgrade or similar package manager commands."
        type: string
        default: ""
        required: false
      build_args:
        description: "Newline-separated list of build args (KEY=VALUE) passed to docker build"
        type: string
        default: ""
        required: false
    secrets:
      GHCR_TOKEN:
        description: "The token to authenticate against GHCR"
        required: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-publish:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=schedule,pattern=daily-{{date 'YYYYMMDD'}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          secrets: |
            github_token=${{ secrets.GHCR_TOKEN }}
          no-cache-filters: ${{ inputs.no_cache_filter }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # ratchet:anchore/scan-action@v7.4.0
        with:
          image: ghcr.io/${{ github.repository }}:latest
          output-format: table
          fail-build: true
          severity-cutoff: low
          only-fixed: true

      - name: Generate Grype SARIF report
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # ratchet:anchore/scan-action@v7.4.0
        if: always()
        id: grype-sarif
        with:
          image: ghcr.io/${{ github.repository }}:latest
          output-format: sarif
          fail-build: false
          severity-cutoff: low

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}

      - name: Smoke test
        if: inputs.smoke_test != ''
        timeout-minutes: ${{ fromJSON(inputs.smoke_test_timeout) }}
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: ${{ inputs.smoke_test }}

      - name: Smoke test container logs
        if: failure() && inputs.smoke_test != ''
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: |
          for cid in $(docker ps -aq --filter "ancestor=$IMAGE"); do
            echo "::group::Logs from container $cid"
            docker logs "$cid" 2>&1 || true
            echo "::endgroup::"
            docker rm -f "$cid" > /dev/null 2>&1 || true
          done

      - name: Push Docker image
        if: inputs.push && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            docker push "$tag"
          done
