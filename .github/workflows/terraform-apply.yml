name: Terraform Apply
on:
  workflow_call:
    inputs:
      terraform_version:
        description: Terraform version to use
        default: "1.14.4"
        required: false
        type: string
      working_directory:
        description: Directory containing Terraform configuration
        default: terraform
        required: false
        type: string
      infisical_common_env:
        description: Infisical environment slug for common secrets
        default: terraform-common
        required: false
        type: string
      infisical_project_env:
        description: Infisical environment slug for project secrets (defaults to terraform-{repo-name})
        default: ""
        required: false
        type: string
      infisical_project_slug:
        description: Infisical project slug
        default: terraform
        required: false
        type: string
      extra_env:
        description: Newline-separated KEY=VALUE pairs added to the terraform apply environment
        default: ""
        required: false
        type: string
    secrets:
      INFISICAL_IDENTITY_ID:
        description: Infisical machine identity ID for OIDC auth
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Fetch common secrets from Infisical
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058 # ratchet:Infisical/secrets-action@v1.0.15
        with:
          domain: https://eu.infisical.com
          method: oidc
          oidc-audience: ${{ github.server_url }}/${{ github.repository_owner }}
          env-slug: ${{ inputs.infisical_common_env }}
          project-slug: ${{ inputs.infisical_project_slug }}
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          export-type: env

      - name: Fetch project secrets from Infisical
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058 # ratchet:Infisical/secrets-action@v1.0.15
        with:
          domain: https://eu.infisical.com
          method: oidc
          oidc-audience: ${{ github.server_url }}/${{ github.repository_owner }}
          env-slug: ${{ inputs.infisical_project_env || format('terraform-{0}', github.event.repository.name) }}
          project-slug: ${{ inputs.infisical_project_slug }}
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          export-type: env

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Export extra environment variables
        if: inputs.extra_env != ''
        run: echo "$EXTRA_ENV" >> "$GITHUB_ENV"
        env:
          EXTRA_ENV: ${{ inputs.extra_env }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve
